<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>VirtualDream</title>
  <desc>Animated banner with dark starry night sky and glowing text for VirtualDream</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0720"/>
      <stop offset="55%" stop-color="#0a051a"/>
      <stop offset="100%" stop-color="#07050f"/>
    </linearGradient>
    <radialGradient id="neb1" cx="28%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b1a6e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#07050f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="75%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#1a0a3a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#07050f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#4c1d95" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#07050f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="40%" stop-color="#818cf8"/>
      <stop offset="80%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#c084fc">
        <animate attributeName="stop-color" values="#c084fc;#818cf8;#c084fc" dur="4s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fadebot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="65%" stop-color="#07050f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07050f" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#sky)" rx="12"/>
  <rect width="800" height="200" fill="url(#neb1)" rx="12"/>
  <rect width="800" height="200" fill="url(#neb2)" rx="12"/>
  <rect width="800" height="200" fill="url(#glow)" rx="12"/>

